<script>
    // ----------------------------------------------------------------
    // 1. STANDARD EA FUNCTIONS
    // ----------------------------------------------------------------
    function switchProjectProperties() {
        var ids = ["proj00", "proj01", "proj02", "proj03", "proj04", "proj05"];
        var display = document.getElementById("proj00").style.display == "none" ? "revert" : "none";
        ids.forEach(function(id) {
            var el = document.getElementById(id);
            if (el) el.style.display = display;
        });
    }

    function switchAdvancedProperties() {
        var ids = ["adv00", "adv01"];
        var display = document.getElementById("adv00").style.display == "none" ? "revert" : "none";
        ids.forEach(function(id) {
            var el = document.getElementById(id);
            if (el) el.style.display = display;
        });
    }

    function initPage() {
        var divs = document.getElementsByClassName("ObjectDetailsNotes");
        for (var j = 0; j < divs.length; j++) {
            var tmpStr = divs[j].innerHTML;
            tmpStr = tmpStr.replace(/#gt;/g, "&gt;");
            tmpStr = tmpStr.replace(/#lt;/g, "&lt;");
            tmpStr = tmpStr.replace(/&gt;/g, ">");
            tmpStr = tmpStr.replace(/&lt;/g, "<");
            divs[j].innerHTML = tmpStr;
        }
        if (document.getElementById('TableGroup') != null) {
            toggleItem(document.getElementById('TableGroup').getElementsByTagName('li')[0].id.replace("Title", ""));
        }
    }

    // ----------------------------------------------------------------
    // 2. ZOOM LOGIC
    // ----------------------------------------------------------------
    function resizeMapCoordinates() {
        const img = document.querySelector('.diagram_image img');
        const mapAreas = document.querySelectorAll('area');
        if (!img || mapAreas.length === 0) return;
        if (img.naturalWidth === 0) { setTimeout(resizeMapCoordinates, 100); return; }

        if (!img.hasAttribute('data-original-width')) {
            img.setAttribute('data-original-width', img.naturalWidth);
            img.setAttribute('data-original-height', img.naturalHeight);
            mapAreas.forEach(area => {
                area.setAttribute('data-original-coords', area.getAttribute('coords'));
            });
        }

        const scale = img.clientWidth / parseFloat(img.getAttribute('data-original-width'));

        mapAreas.forEach(area => {
            const originalCoords = area.getAttribute('data-original-coords').split(',').map(Number);
            const scaledCoords = originalCoords.map(coord => Math.round(coord * scale));
            area.setAttribute('coords', scaledCoords.join(','));
        });
    }

    var currentZoom = 100; 

function zoomDiagram(direction) {
    const img = document.querySelector('.diagram_image img');
    if (!img) return;
    
    if (direction === 'in') currentZoom += 10;
    if (direction === 'out') currentZoom = Math.max(10, currentZoom - 10);
    if (direction === 'reset') currentZoom = 100;
    
    const newWidthPx = img.naturalWidth * (currentZoom / 100);
    img.style.setProperty('width', newWidthPx + 'px', 'important');
    img.style.setProperty('height', 'auto', 'important');
    img.style.setProperty('max-width', 'none', 'important');
    
    // 1. Update the image map areas first
    resizeMapCoordinates();

    // 2. Clear the old highlight immediately so it doesn't "ghost" while zooming
    const oldBox = document.getElementById('ea-highlight-box');
    if (oldBox) oldBox.remove();

    // 3. Wait for the browser to finish the resize animation/layout (150ms)
    // then re-draw and re-center the scroll
    setTimeout(() => {
        applyHighlight();
    }, 150); 
}


    // ----------------------------------------------------------------
    // 3. INTERCEPT DIAGRAM CLICKS (Smart Redirect + Tooltip)
    // ----------------------------------------------------------------
    function interceptDiagramClicks() {
        const areas = document.querySelectorAll('area');
        if (areas.length === 0) return;

        // Setup Tooltip
        var tooltip = document.getElementById('custom-tooltip');
        if (!tooltip) {
            tooltip = document.createElement('div');
            tooltip.id = 'custom-tooltip';
            document.body.appendChild(tooltip);
        }

        // Calculate Root Path
        var links = document.getElementsByTagName('link');
        var rootPath = "";
        for (var i = 0; i < links.length; i++) {
            if (links[i].href.indexOf('ea.css') > -1) {
                rootPath = links[i].getAttribute('href').replace('css/ea.css', '');
                break;
            }
        }

        // Helper: Get Target Info
function getTargetInfo(areaElement) {
    var targetName = "";
    var isRedirect = false;
    var finalLink = areaElement.href;

    var filename = areaElement.href.substring(areaElement.href.lastIndexOf('/') + 1);

    if (typeof diagramLookup !== 'undefined') {
        if (diagramLookup[filename]) targetName = diagramLookup[filename];
    }
    if (!targetName) {
        var title = areaElement.getAttribute('data-original-title') || areaElement.getAttribute('title') || "";
        if (title.includes(':')) targetName = title.split(':')[0].trim();
        else targetName = title;
    }
    if (!targetName && typeof globalSearchData !== 'undefined') {
        var filenameNoExt = filename.replace('.htm', '').toLowerCase();
        var fallbackMatch = globalSearchData.find(item => {
            var itemFile = item.link.substring(item.link.lastIndexOf('/') + 1).replace('.htm', '').toLowerCase();
            return itemFile === filenameNoExt;
        });
        if (fallbackMatch) targetName = fallbackMatch.name;
    }

    if (targetName && typeof diagramLookup !== 'undefined') {
        for (var diagramFile in diagramLookup) {
            if (diagramLookup[diagramFile] === targetName) {
                isRedirect = true;
                if (typeof globalSearchData !== 'undefined') {
                    var redirectMatch = globalSearchData.find(item => item.name === targetName);
                    if (redirectMatch) finalLink = rootPath + redirectMatch.link;
                }
                break;
            }
        }
    }

    return { name: targetName, isRedirect: isRedirect, link: finalLink };
}

        areas.forEach(area => {
            // Backup native title
            var nativeTitle = area.getAttribute('title');
            if (nativeTitle) {
                area.setAttribute('data-original-title', nativeTitle);
                area.removeAttribute('title');
            }

            // A. MOUSE ENTER: Show Tooltip Once
          area.addEventListener('mouseenter', function(e) {
    var info = getTargetInfo(this);
    if (!info.name) return;

    if (info.isRedirect) {
        tooltip.innerHTML = '<strong>' + info.name + '</strong><br>' + 
                          '<span class="tooltip-hint">Click: Specification &bull; Ctrl+Click: Diagram</span>';
    } else {
        tooltip.innerHTML = '<strong>' + info.name + '</strong><br>' + 
                          '<span class="tooltip-hint">Click: Specification</span>';
    }

                tooltip.style.left = (e.pageX + 15) + 'px';
                tooltip.style.top = (e.pageY + 15) + 'px';
                tooltip.style.display = 'block';
            });

            // B. MOUSE LEAVE: Hide Tooltip
            area.addEventListener('mouseleave', function() {
                tooltip.style.display = 'none';
            });

            // C. CLICK: Navigation Logic
            area.addEventListener('click', function(e) {
                if (!this.href.includes('.htm')) return;

                // Ctrl+Click = Force Diagram (Current Tab)
                if (e.ctrlKey || e.metaKey) { 
                    e.preventDefault();
                    window.location.href = this.href; 
                    return;
                }

                // Normal Click = Try Redirect
                var info = getTargetInfo(this);
                if (info.isRedirect) {
                    e.preventDefault();
                    window.location.href = info.link;
                }
            });
        });
    }

    // ----------------------------------------------------------------
    // 4. CLEANUP (Sort + Filter Prefixes + Hide Archives)
    // ----------------------------------------------------------------
    function sortTreeview() {
        const treeList = document.querySelector('.indexcell ul');
        if (!treeList) return;
        const listItems = Array.from(treeList.children);
        listItems.sort((a, b) => {
            const isFolder = (li) => {
                const img = li.querySelector('img');
                return img && img.getAttribute('alt') === 'Package';
            };
            const aIsFolder = isFolder(a);
            const bIsFolder = isFolder(b);
            if (aIsFolder && !bIsFolder) return -1; 
            if (!aIsFolder && bIsFolder) return 1;
            const aLink = a.querySelector('a');
            const bLink = b.querySelector('a');
            if (!aLink || !bLink) return 0;
            return aLink.innerText.toLowerCase().localeCompare(bLink.innerText.toLowerCase());
        });
        listItems.forEach(item => treeList.appendChild(item));
    }

    function cleanTreeview() {
        // A. Filter Sidebar Prefixes
        const treeList = document.querySelector('.indexcell ul');
        if (treeList) {
            const listItems = treeList.querySelectorAll('li');
            const prefixesToHide = ["Program:", "System:", "Project:", "Subsystem:", "Function:"];
            listItems.forEach(li => {
                const text = li.innerText.trim();
                const shouldHide = prefixesToHide.some(prefix => text.startsWith(prefix));
                if (shouldHide) li.style.display = 'none';
            });
        }

        // B. Hide Archive (Appears In)
        const appearsInRow = document.getElementById('adv01');
        if (appearsInRow) {
            const valueCell = appearsInRow.getElementsByTagName('td')[1]; 
            if (valueCell) {
                const items = valueCell.innerHTML.split(/,\s*/);
                const linkedItemsOnly = items.filter(item => item.toLowerCase().includes('<a href'));
                if (linkedItemsOnly.length === 0) {
                    appearsInRow.style.display = 'none';
                } else {
                    valueCell.innerHTML = linkedItemsOnly.join(', ');
                }
            }
        }

        // C. Hide Archive (Relationships)
        const linkDiv = document.querySelector('#LinksTable') || 
                        document.querySelector('#TableGroup .ItemBody:last-child table');
        if (linkDiv) {
            const rows = linkDiv.querySelectorAll('tr');
            rows.forEach(row => {
                if (row.querySelector('th')) return;
                const firstCell = row.cells[0];
                if (firstCell && !firstCell.innerHTML.toLowerCase().includes('<a href')) {
                    row.style.display = 'none';
                }
            });
        }
    }

    // ----------------------------------------------------------------
    // 5. GLOBAL SEARCH FUNCTION
    // ----------------------------------------------------------------
    function performGlobalSearch() {
        const input = document.getElementById('sidebarSearch');
        const query = input.value.toLowerCase().trim();
        const resultsContainer = document.getElementById('searchResults');
        const originalTree = document.getElementById('originalTree');

        if (!query) {
            resultsContainer.style.display = 'none';
            originalTree.style.display = 'block';
            return;
        }

        originalTree.style.display = 'none';
        resultsContainer.style.display = 'block';
        resultsContainer.innerHTML = '';

        if (typeof globalSearchData === 'undefined') {
            resultsContainer.innerHTML = '<div style="padding:10px; color:red; font-size:12px;">Index missing.<br>Run build_search.ps1</div>';
            return;
        }

        const cssLink = document.querySelector('link[href*="ea.css"]');
        let rootPath = "";
        if (cssLink) {
             const cssPath = cssLink.getAttribute('href');
             rootPath = cssPath.substring(0, cssPath.lastIndexOf('css/'));
        }

        const matches = globalSearchData.filter(item => item.name.toLowerCase().includes(query));

        if (matches.length === 0) {
            resultsContainer.innerHTML = '<div style="padding:10px; color:#666; font-size:12px;">No results found.</div>';
            return;
        }

        const limit = matches.slice(0, 50);

        limit.forEach(item => {
            const div = document.createElement('div');
            div.className = "search-result-item";
            const link = document.createElement('a');
            link.href = rootPath + item.link;
            link.innerText = item.name;
            link.onclick = function(e) {
                 e.preventDefault();
                 window.location.href = this.href;
            };
            div.appendChild(link);
            resultsContainer.appendChild(div);
        });
    }

    // ----------------------------------------------------------------
    // 6. INITIALIZATION
    // ----------------------------------------------------------------
    function simplifyHeaderTitle() {
        const h1 = document.querySelector('.header_frame h1');
        if (!h1) return;
        let text = h1.textContent.trim();
        if (text.includes('::')) text = text.split('::').pop().trim();
        text = text.replace(/\s*:\s*Public\s*(?:<<.*?>>\s*)?.*$/i, '').trim();
        h1.textContent = text;
    }

    window.addEventListener('load', () => {
        initPage();
        resizeMapCoordinates();
        window.addEventListener('resize', resizeMapCoordinates);
        sortTreeview();
        cleanTreeview(); // Prefixes & Archives
        interceptDiagramClicks();

        simplifyHeaderTitle(); // <-- cleans header text

        // ----------------------------------------------------------------
        // DELPHI RVAM BUTTON: Show only on the Delphi requirements diagram
        // ----------------------------------------------------------------
        (function() {
            const h1 = document.querySelector('.header_frame h1');
            const delphiBox = document.getElementById('delphi-rvam-box');
            if (h1 && delphiBox) {
                const pageTitle = h1.textContent.trim();
                if (pageTitle.includes('855DC-1541-DEL Delphi')) {
                    delphiBox.style.display = 'block';
                }
            }
        })();

        // Netlify Navigation Fix
        const navLinks = document.querySelectorAll(
            'a[href^="./"], a[href^="../"], a[href$=".htm"], a[href$=".html"]'
        );
        navLinks.forEach(link => {
            const targetUrl = link.getAttribute('href');
            if (targetUrl && !targetUrl.includes('//') && targetUrl.indexOf('javascript:') === -1) {
                link.addEventListener('click', (event) => {
                    event.preventDefault();
                    window.location.href = targetUrl;
                });
            }
        });

        // Breadcrumb Home Fix
        const breadcrumbRoot = document.querySelector('.breadcrumb_frame p a');
        const cssLink = document.querySelector('link[href*="ea.css"]');
        if (breadcrumbRoot && cssLink) {
            const cssPath = cssLink.getAttribute('href');
            const rootPath = cssPath.substring(0, cssPath.lastIndexOf('css/'));
            const targetIndex = rootPath + "index.htm";
            breadcrumbRoot.href = targetIndex; 
            breadcrumbRoot.target = "_top"; 
            breadcrumbRoot.addEventListener('click', (e) => {
                e.preventDefault();
                window.top.location.href = targetIndex;
            });
        }
		// ----------------------------------------------------------------
// DOWNLOAD LINK FIX (all files/ links, depth-independent)
// ----------------------------------------------------------------
const cssLinkDownload = document.querySelector('link[href*="ea.css"]');
if (cssLinkDownload) {
    const cssPathDownload = cssLinkDownload.getAttribute('href');
    const rootPathDownload = cssPathDownload.substring(0, cssPathDownload.lastIndexOf('css/'));

    document.querySelectorAll('a[href*="files/"]').forEach(link => {
        const href = link.getAttribute('href');
        const filename = href.substring(href.indexOf('files/'));
        link.href = rootPathDownload + filename;
    });
}
// ----------------------------------------------------------------
// LEGEND SWITCHING (SBS Special Case)
// ----------------------------------------------------------------
(function() {
    const legendImg = document.querySelector('#legend-panel img');
    const legendPanel = document.getElementById('legend-panel');
    if (!legendImg || !legendPanel) return;
    const header = document.querySelector('.header_frame h1');
    if (!header) return;
    const pageTitle = header.textContent.trim().toLowerCase();
    if (pageTitle.includes('system breakdown structure')) {
        legendImg.src = legendImg.src.replace('legend.svg', 'legendsbs.svg');
        legendPanel.style.width = '260px';
} else if (pageTitle.includes('requirements')) {
    const base = legendImg.src.substring(0, legendImg.src.lastIndexOf('/earoot/') + 1);
    legendImg.src = base + 'images/legendreq.svg';
    legendPanel.style.width = '280px';
} else {
        legendPanel.style.width = '280px';
    }
})();

        // ----------------------------------------------------------------
        // 8. SHORTCUTS (Keyboard & Mouse Zoom)
        // ----------------------------------------------------------------
        (function() {
            // Keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey) {
                    if (e.key === '+' || e.key === '=' || e.code === 'NumpadAdd') {
                        e.preventDefault(); zoomDiagram('in');
                    } else if (e.key === '-' || e.code === 'NumpadSubtract') {
                        e.preventDefault(); zoomDiagram('out');
                    } else if (e.key === '0' || e.code === 'Numpad0') {
                        e.preventDefault(); zoomDiagram('reset');
                    }
                }
            });

            // Mouse wheel zoom
            document.addEventListener('wheel', function(e) {
                if (e.ctrlKey) {
                    e.preventDefault(); 
                    if (e.deltaY < 0) zoomDiagram('in');
                    else zoomDiagram('out');
                }
            }, { passive: false });
        })();
    });
</script>

<script>
/**
 * 0. REMOVE CATCH-ALL LINK & ENABLE PANNING
 */
function removeCatchAllLink() {
    var diagramContainer = document.querySelector('.diagram_image');
    if (!diagramContainer) return;
    
    var map = diagramContainer.querySelector('map');
    if (!map) return;
    
    var areas = map.querySelectorAll('area');
    
    if (areas.length > 0) {
        var lastArea = areas[areas.length - 1];
        var coords = lastArea.getAttribute('coords');
        var href = lastArea.getAttribute('href') || '';
        
        if ((coords && coords.split(',').length > 10) || href.toUpperCase().startsWith('EA')) {
            lastArea.remove();
            console.log("EA Catch-All Hyperlink Removed (last area).");
            return;
        }
        
        areas.forEach(area => {
            if (area.getAttribute('shape') === 'default') {
                area.remove();
                console.log("EA Catch-All Hyperlink Removed (shape=default).");
            }
        });
    }
}

// Run catch-all removal and panning setup
var diagramScroller = document.querySelector('.diagram_image');
if (diagramScroller) {
    removeCatchAllLink();
    if (typeof enablePanning === 'function') {
        enablePanning(diagramScroller);
    }
}

// Initialize currentZoom if not already set
if (typeof currentZoom === 'undefined') {
    var currentZoom = 100;
}

/**
 * Clear highlight only
 */
function clearHighlight() {
    const box = document.getElementById('ea-highlight-box');
    if (box) box.remove();
    
    // Clear the hash
    if (window.location.hash) {
        history.replaceState(null, null, window.location.pathname);
    }
    
    // Hide the clear button
    updateClearButtonVisibility();
}

/**
 * Show/hide clear button based on highlight existence
 */
function updateClearButtonVisibility() {
    const clearBtn = document.getElementById('clear-highlight-btn');
    const highlight = document.getElementById('ea-highlight-box');
    
    if (clearBtn) {
        clearBtn.style.display = highlight ? 'inline-block' : 'none';
    }
}

/**
 * Auto-zoom to fit highlighted block in viewport
 */
function autoZoomToFit(coords) {
    const img = document.querySelector('.diagram_image img');
    const scrollContainer = document.querySelector('.diagram_image');
    if (!img || !scrollContainer) return;
    
    // Get the block dimensions at 100% zoom
    const blockWidth = coords[2] - coords[0];
    const blockHeight = coords[3] - coords[1];
    
    // Get viewport dimensions (with some padding)
    const viewportWidth = scrollContainer.clientWidth * 0.8;
    const viewportHeight = scrollContainer.clientHeight * 0.8;
    
    // Calculate zoom levels needed to fit width and height
    const zoomForWidth = (viewportWidth / blockWidth) * 100;
    const zoomForHeight = (viewportHeight / blockHeight) * 100;
    
    // Use the smaller zoom to ensure both dimensions fit
    const optimalZoom = Math.min(zoomForWidth, zoomForHeight);
    
    // Clamp zoom between 10% and 100% (never zoom in beyond actual size)
    currentZoom = Math.max(10, Math.min(100, Math.round(optimalZoom)));
    
    // Apply the zoom
    const newWidthPx = img.naturalWidth * (currentZoom / 100);
    img.style.setProperty('width', newWidthPx + 'px', 'important');
    img.style.setProperty('height', 'auto', 'important');
    
    if (typeof resizeMapCoordinates === 'function') {
        resizeMapCoordinates();
    }
}

/**
 * 1. HIGHLIGHT LOGIC (Case-Insensitive & Zoom-Aware)
 * NOW WITH DIAGRAM REDIRECT SUPPORT VIA REVERSE diagramLookup
 */
function applyHighlight(scrollToHighlight) {
    if (typeof scrollToHighlight === 'undefined') scrollToHighlight = true;
    const hash = window.location.hash.replace("#", "").trim();
    if (!hash) return;

    let searchId = hash.toLowerCase();
    const areas = document.querySelectorAll('area');
    const container = document.querySelector('.diagram_image');
    if (!container) return;

    const scale = (typeof currentZoom !== 'undefined') ? currentZoom / 100 : 1;
    
    // STEP 1: Try to find the diagram page for this hash ID
    // First, get the element name from globalSearchData
    let elementName = null;
    if (typeof globalSearchData !== 'undefined') {
        const match = globalSearchData.find(item => {
            const itemFilename = item.link.substring(item.link.lastIndexOf('/') + 1).replace('.htm', '').toLowerCase();
            return itemFilename === searchId;
        });
        
        if (match) {
            elementName = match.name;
            console.log("Found element name: " + elementName);
        }
    }
    
    // STEP 2: If we found the element name, check if it has a diagram page
    let searchFilename = searchId + '.htm';
    if (elementName && typeof diagramLookup !== 'undefined') {
        for (let diagramFile in diagramLookup) {
            if (diagramLookup[diagramFile] === elementName) {
                searchFilename = diagramFile.toLowerCase();
                console.log("Redirecting search from " + searchId + ".htm to diagram page " + searchFilename);
                break;
            }
        }
    }
    
    // STEP 3: Search for the element in the image map
    let targetArea = null;
    
    for (let area of areas) {
        let areaHref = (area.getAttribute('href') || "").toLowerCase();
        let areaFilename = areaHref.substring(areaHref.lastIndexOf('/') + 1);
        
        if (areaFilename === searchFilename) {
            targetArea = area;
            console.log("Matched area with href: " + areaHref);
            break;
        }
    }

    if (targetArea) {
        console.log("Found match for: " + searchFilename);
        const coordAttr = targetArea.getAttribute('data-original-coords') || targetArea.getAttribute('coords');
        const coords = coordAttr.split(',').map(Number);
        
        const oldHighlight = document.getElementById('ea-highlight-box');
        if (oldHighlight) oldHighlight.remove();

        if (scrollToHighlight) {
            // Auto-zoom to fit the highlighted block
            autoZoomToFit(coords);
        }

        // Recalculate scale after potential zoom change
        const scale = (typeof currentZoom !== 'undefined') ? currentZoom / 100 : 1;

        const highlight = document.createElement('div');
        highlight.id = 'ea-highlight-box';
        
        const left = coords[0] * scale;
        const top = coords[1] * scale;
        const width = (coords[2] - coords[0]) * scale;
        const height = (coords[3] - coords[1]) * scale;

        highlight.style.cssText = `
            position: absolute;
            box-sizing: border-box;
            border: ${Math.max(2, 6 * scale)}px solid #FF0000;
            background-color: rgba(255, 255, 0, 0.2);
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 ${15 * scale}px red;
            left: ${left}px;
            top: ${top}px;
            width: ${width}px;
            height: ${height}px;
        `;
        
        container.style.position = 'relative'; 
        container.appendChild(highlight);

        if (scrollToHighlight) {
            setTimeout(() => {
                highlight.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            }, 150);
        }
        
        // Show the clear button after highlight is created
        updateClearButtonVisibility();
    } else {
        console.warn("Could not find area for: " + searchFilename + " (original hash: " + hash + ")");
    }
}

/**
 * 2. OPTIMIZED INITIALIZATION - WITH RETRY FOR DATA LOADING
 */
function initDiagramHighlight() {
    const diagramImg = document.querySelector('.diagram_image img');
    
    if (diagramImg) {
        if (diagramImg.complete) {
            fastRebind(diagramImg);
        } else {
            diagramImg.addEventListener('load', () => fastRebind(diagramImg));
        }
    } else {
        setTimeout(initDiagramHighlight, 50);
    }
}

function fastRebind(img) {
    const currentMap = img.getAttribute('usemap');
    if (currentMap) {
        img.setAttribute('usemap', '');
        img.setAttribute('usemap', currentMap);
    }

    if (typeof resizeMapCoordinates === 'function') {
        resizeMapCoordinates();
    }

    console.log("Map re-bound via Attribute Toggle");

    if (window.location.hash) {
        // Try to highlight, but if data isn't loaded yet, retry
        applyHighlight();
        
        // If globalSearchData or diagramLookup aren't available, retry after delay
        if (typeof globalSearchData === 'undefined' || typeof diagramLookup === 'undefined') {
            console.log("Search data not yet loaded, will retry in 500ms...");
            setTimeout(applyHighlight, 500);
        }
    }
}

// Start the sequence
initDiagramHighlight();

/**
 * 3. ZOOM INTEGRATION (Center-anchored)
 */
function zoomDiagram(direction) {
    const img = document.querySelector('.diagram_image img');
    if (!img) return;

    const scrollContainer = document.querySelector('.diagram_image');

    // 1. Find the anchor point - use highlight center if it exists, otherwise screen center
    let centerX, centerY;
    const highlight = document.getElementById('ea-highlight-box');
    if (highlight) {
        // Anchor on the center of the highlighted block
        centerX = parseFloat(highlight.style.left) + parseFloat(highlight.style.width) / 2;
        centerY = parseFloat(highlight.style.top) + parseFloat(highlight.style.height) / 2;
    } else {
        // Anchor on the center of the visible area
        centerX = scrollContainer.scrollLeft + scrollContainer.clientWidth / 2;
        centerY = scrollContainer.scrollTop + scrollContainer.clientHeight / 2;
    }

    // 2. Express that as a ratio of the current image size
    const ratioX = centerX / img.clientWidth;
    const ratioY = centerY / img.clientHeight;

    if (direction === 'reset') {
        currentZoom = 100;
        // Don't clear highlight or hash anymore - that's what Clear button does
    }
    
    if (direction === 'in') currentZoom += 10;
    if (direction === 'out') currentZoom = Math.max(10, currentZoom - 10);
    
    const newWidthPx = img.naturalWidth * (currentZoom / 100);
    img.style.setProperty('width', newWidthPx + 'px', 'important');
    img.style.setProperty('height', 'auto', 'important');
    
    resizeMapCoordinates();

    // 4. Scroll so the same point is back at the center
    scrollContainer.scrollLeft = (ratioX * img.clientWidth) - scrollContainer.clientWidth / 2;
    scrollContainer.scrollTop = (ratioY * img.clientHeight) - scrollContainer.clientHeight / 2;

    // Remove old highlight box and reapply at new scale (for all zoom operations)
    const oldBox = document.getElementById('ea-highlight-box');
    if (oldBox) oldBox.remove();

    // Reapply highlight at the new zoom level if we have a hash
    if (window.location.hash) {
        setTimeout(() => {
            applyHighlight(false);
            updateClearButtonVisibility();
        }, 150); 
    } else {
        updateClearButtonVisibility();
    }
}

/**
 * 4. NETLIFY IMAGE MAP RE-BINDING (from original template)
 */
window.addEventListener('load', function() {
    setTimeout(function() {
        var diagramImg = document.querySelector('.diagram_image img');
        
        if (diagramImg && diagramImg.hasAttribute('usemap')) {
            var currentSrc = diagramImg.src;
            diagramImg.src = ''; 
            diagramImg.src = currentSrc;
            console.log("EA Image Map Re-bound for Netlify.");
        }
    }, 500);
});

function toggleLegend() {
    const panel = document.getElementById('legend-panel');
    const btn = document.getElementById('legend-toggle-btn');
    const isVisible = panel.style.display !== 'none';
    panel.style.display = isVisible ? 'none' : 'block';
    btn.textContent = isVisible ? 'Show Diagram Key' : 'Hide Diagram Key';
}

function initLegendButtonVisibility() {
    const diagramEl = document.querySelector('.diagram_image');
    const btn = document.getElementById('legend-toggle-btn');
    if (!diagramEl || !btn) return;

    function showLegendBtn() {
        btn.style.display = 'block';
    }

    // Show on scroll/pan
    diagramEl.addEventListener('scroll', showLegendBtn, { once: true });

    // Show on zoom
    const origZoom = window.zoomDiagram;
    window.zoomDiagram = function(direction) {
        showLegendBtn();
        origZoom(direction);
    };
}

initLegendButtonVisibility();
</script>
